<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下载</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes glow {
    0%,100% { opacity: 0.12; transform: scale(1); }
    50% { opacity: 0.22; transform: scale(1.05); }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: glow 6s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; top: -120px; right: -100px; background: rgba(38,204,196,0.1); }
  .orb2 { width: 300px; height: 300px; bottom: -80px; left: -80px; background: rgba(38,204,196,0.08); animation-delay: 3s; }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .download-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .download-item {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    border-radius: 8px;
    text-decoration: none;
    background: #26CCC4;
    border: none;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .download-item:nth-child(1) { animation: fadeUp 0.5s ease both 0.05s; }
  .download-item:nth-child(2) { animation: fadeUp 0.5s ease both 0.1s; }
  .download-item:nth-child(3) { animation: fadeUp 0.5s ease both 0.15s; }
  .download-item:nth-child(4) { animation: fadeUp 0.5s ease both 0.2s; }
  .download-item:nth-child(5) { animation: fadeUp 0.5s ease both 0.25s; }
  .download-item:hover {
    background: #20b5ae;
    box-shadow: 0 4px 24px rgba(38,204,196,0.3);
    transform: translateY(-2px);
  }

  .item-icon {
    width: 46px;
    height: 46px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 14px;
    background: rgba(255,255,255,0.18);
  }
  .item-icon svg { width: 24px; height: 24px; fill: #fff; }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 700; color: #fff; }
  .item-desc { font-size: 12px; color: rgba(255,255,255,0.9); margin-top: 3px; }

  .item-action {
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 8px;
    white-space: nowrap;
    flex-shrink: 0;
    color: #26CCC4;
    background: #fff;
    transition: all 0.2s ease;
  }
  .download-item:hover .item-action {
    background: rgba(255,255,255,0.95);
  }

  @media (max-width: 500px) {
    body { padding: 30px 16px; }
    .download-item { padding: 14px 14px; }
    .item-icon { width: 40px; height: 40px; margin-right: 12px; }
    .item-icon svg { width: 20px; height: 20px; }
    .item-name { font-size: 14px; }
    .item-desc { font-size: 11px; }
    .item-action { padding: 7px 14px; font-size: 12px; }
  }
</style>
</head>
